    <script>
        function setThemeClass() {
            document.documentElement.className = "theme_"+Telegram.WebApp.colorScheme;
            
        }
        Telegram.WebApp.onEvent('themeChanged', setThemeClass);
        setThemeClass();

    <style>
        :root { --color-h: 207; /* Hue */ --color-s: 73%; /* Saturation */ --color-l: 57%; /* Lightness */ } 

        body {
            font-family: sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #222222);
            font-size: 16px;
            margin: 0;
            padding: 0;
            color-scheme: var(--tg-color-scheme);
        }

        a {
            color: var(--tg-theme-link-color, #2678b6);
        }

        button {
            display: block;
            width: 100%;
            font-size: 14px;
            margin: 15px 0;
            padding: 14px 20px;
            border: none;
            border-radius: 12px;
            background-color: var(--tg-theme-button-color, #50a8eb);
            color: var(--tg-theme-button-text-color, #ffffff);
            cursor: pointer;
         /*  margin:18px 6% 2px 6%; */
    
            
        }

        button[disabled] {
            opacity: 0.6;
            cursor: auto;
            pointer-events: none;
        }

        button.close_btn {
            /*position: fixed;*/
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 0;
            margin: 0;
            padding: 16px 20px;
            text-transform: uppercase;
        }
         
        p {
            margin: 40px 0 15px;
        }

        ul {
            text-align: left;
        }

        li {
            color: var(--tg-theme-hint-color, #a8a8a8);
        }

        textarea {
            width: 100%;
            box-sizing: border-box;
            padding: 7px;
        }

        pre {
            background: rgba(0, 0, 0, .07);
            border-radius: 4px;
            padding: 4px;
            margin: 7px 0;
            word-break: break-all;
            word-break: break-word;
            white-space: pre-wrap;
            text-align: left;
        }

        .dark pre {
            background: rgba(255, 255, 255, .15);
        }

        .hint {
            font-size: .8em;
            color: var(--tg-theme-hint-color, #a8a8a8);
        }

        .ok {
            color: green;
        }

        .err {
            color: red;
        }

        #fixed_wrap {
            position: fixed;
            left: 0;
            right: 0;
            top: 0;
            transform: translateY(100vh);
        }

        .viewport_border,
        .viewport_stable_border {
            position: fixed;
            left: 0;
            right: 0;
            top: 0;
            height: var(--tg-viewport-height, 100vh);
            pointer-events: none;
        }

        .viewport_stable_border {
            height: var(--tg-viewport-stable-height, 100vh);
        }

        .viewport_border:before,
        .viewport_stable_border:before {
            content: attr(text);
            display: inline-block;
            position: absolute;
            background: gray;
            right: 0;
            top: 0;
            font-size: 7px;
            padding: 2px 4px;
            vertical-align: top;
        }

        .viewport_stable_border:before {
            background: green;
            left: 0;
            right: auto;
        }

        .viewport_border:after,
        .viewport_stable_border:after {
            content: '';
            display: block;
            position: absolute;
            left: 0;
            right: 0;
            top: 0;
            bottom: 0;
            border: 2px dashed gray;
        }

        .viewport_stable_border:after {
            border-color: green;
        }

        small {
            font-size: 12px;
        }
        
    
        
   .textfield-item {
    outline: 0px solid red;
    margin:2px 6% 12px 6%;
    border:1px solid rgba(100,100,100,0.2);
    display:block;
    border-radius:12px 12px;
    padding: 4px 12px;
   } 
   .textfield-item-underline{
    border-bottom: 1px solid var(--tg-theme-button-color) ;
    border-radius:10px 10px 0 0;
    margin:0px 12px;
    background: var(--tg-theme-button-color,var(--accent-btn-color));
   }
   .textfield-item input.form-control{
    paddind:8px;
    border:none;
   }
   
   label{
    margin: 0 8%;
    color: var(--tg-theme-text-color);
   }
        
        
    .btn-login{
       display: block;
       width: 88%;
       font-size: 14px;
       margin: 16px 6%;
       padding: 14px 20px;
       border: none;
       border-radius: 12px;
       background-color: var(--tg-theme-button-color, var(--accent-btn-color));
       color: var(--tg-theme-button-text-color, #ffffff);
       cursor: pointer;
    }
    
    .ripple {
    background-position: center;
    transition: background .6s ease-out;
    }
    .ripple:hover {
    background: var(--accent-btn-color) radial-gradient(circle, var(--tg-theme-button-color,var(--accent-btn-color)) 1px, var(--tg-theme-button-color,var(--accent-btn-color)), rgba(255,255,255,0.1) 1%, var(--tg-theme-button-color,var(--accent-btn-color)) 1%) center/15000%;
     }
     
     
     
    .ripple:active {
     background-color: var(--accent-btn-color);
     background-size: 100%;
     transition: background 0s;
     }
    
    
        a.tgme_head_right_btn { 
        display: inline-block; 
        font-size: 14px; 
        line-height: 17px; 
        font-weight: bold; 
        -webkit-font-smoothing: antialiased;
        text-transform: uppercase;
        background-color: var(--tg-theme-button-color,var(--accent-btn-color));
        color: var(--button-text-color,var(--box-bg)) ;
        padding: 9px 16px;
        height: 34px;
        border-radius: 17px;        
        text-align: center;
        transition: all .15s ease .15s;
    }
    
 ::placeholder { color: rgba(0,0,0,.42) !important;}
 :focus::placeholder {color: rgba(0,0,0,.26) !important;}
        
    </style>
</head>
