   <style>

.btn{
  padding:12px 18px;
  margin:10px auto 20px;
  border:none;
  font-size:16px;
  border-radius:3px;
  color:#fff;
  background-color:#0D7DBE;
  text-decoration:none;
  cursor:pointer;
  &:focus,
  &:active{
    outline:none;
  }
  
  &:disabled{
    cursor:not-allowed;
  }
  
  &:hover{
    box-shadow:0 4px 12px -3px rgba(0,0,0,.4);
  }
}


body{
       background: #efefef;
      }
      #card{
       background: linear-gradient(to top right, #326, #458);
       width: 420px;
       border: 4px double rgba(255,255,255,.5);
       border-radius: 16px;
       margin:auto;
      }
      #img{
       height: 90px;

       border: 4px solid #fff;
      }
      table{
       width:100%;
       height:100%;
       padding:8px;
       }
      .l{

         padding:10px;
      }
      .r{
         width:80%;
         background: white;
         padding:18px 32px ;
         border-radius: 10px;
      }
     .title{
         font-size: 15px;
         margin-bottom: 8px;
         font-weight:500;
     }
     .caption{
         font-size: 12px;
         color: #666;
     }
   .list{
       margin-top: 16px;
    } 
   .list span {
       display:block;
       font-size: 10px;
       color: #3d3d3d;
       margin:4px 0;
       padding: 6px 6px;
       background: #f5f5ff;
       border-radius: 4px;

    }

</head>

          downloadButton = document.getElementById('btn-download'),

      previewButton.removeAttribute('disabled');
      downloadButton.setAttribute('download', 'screenshot.png');
